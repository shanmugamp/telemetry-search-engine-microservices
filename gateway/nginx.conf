worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # ── Rate limit zones ───────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=upload_zone:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=search_zone:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m    rate=20r/m;

    upstream auth_backend     { server auth-service:8081; }
    upstream coord_backend    { server coordinator:8090; }   # all /api/v1/* → coordinator
    upstream ingest_backend   { server ingest-service:8085; }
    upstream frontend_backend { server frontend:80; }

    server {
        listen 80;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;

        # ── Auth ────────────────────────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── Upload (goes to ingest, NOT coordinator) ─────────────────────
        location /api/v1/upload {
            limit_req zone=upload_zone burst=20 nodelay;
            client_max_body_size 512m;
            proxy_pass http://ingest_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        location /api/v1/jobs {
            proxy_pass http://ingest_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/files {
            proxy_pass http://ingest_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── All other /api/v1/* → coordinator (search, stats, reindex) ──
        location /api/v1/ {
            limit_req zone=search_zone burst=30 nodelay;
            proxy_pass http://coord_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── Frontend ────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
        }
    }
}
