events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=search_zone:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m   rate=20r/m;

    upstream auth_service    { server auth-service:8081;   keepalive 16; }
    upstream search_service  { server search-service:8082; keepalive 32; }
    upstream ingest_service  { server ingest-service:8083; keepalive 16; }
    upstream frontend_service { server frontend:80;        keepalive 16; }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy no-referrer;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID    $request_id;
        proxy_http_version               1.1;
        proxy_set_header Connection      "";

        # ── Auth ──────────────────────────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://auth_service;
        }

        location /api/v1/admin/ {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://auth_service;
        }

        # ── Search ────────────────────────────────────────────────────────────
        location /api/v1/search {
            limit_req zone=search_zone burst=30 nodelay;
            proxy_pass http://search_service;
        }

        location /api/v1/stats {
            limit_req zone=search_zone burst=20 nodelay;
            proxy_pass http://search_service;
        }

        location /api/v1/reindex {
            limit_req zone=upload_zone burst=3 nodelay;
            proxy_pass http://search_service;
        }

        # Internal: ingest-service → search-service after file upload
        location /api/v1/ingest-notify {
            limit_req zone=upload_zone burst=10 nodelay;
            proxy_pass http://search_service;
        }

        # ── Ingest ────────────────────────────────────────────────────────────
        location /api/v1/upload {
            limit_req zone=upload_zone burst=20 nodelay;
            client_max_body_size 512m;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_pass http://ingest_service;
        }

        location /api/v1/files {
            limit_req zone=search_zone burst=20 nodelay;
            proxy_pass http://ingest_service;
        }

        location /api/v1/jobs {
            limit_req zone=search_zone burst=20 nodelay;
            proxy_pass http://ingest_service;
        }

        # ── Health ────────────────────────────────────────────────────────────
        location = /health {
            access_log off;
            proxy_pass http://search_service;
        }

        location = /auth-health {
            access_log off;
            proxy_pass http://auth_service;
        }

        location = /search-health {
            access_log off;
            proxy_pass http://search_service;
        }

        location = /ingest-health {
            access_log off;
            proxy_pass http://ingest_service;
        }

        # ── Frontend (catch-all) ──────────────────────────────────────────────
        location / {
            proxy_pass http://frontend_service;
        }
    }
}
