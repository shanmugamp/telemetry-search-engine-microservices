apiVersion: v1
kind: Namespace
metadata:
  name: telemetry-search
  labels:
    app.kubernetes.io/name: telemetry-search
---
# JWT secret — base64-encode a strong random string for production:
#   echo -n "your-secret" | base64
# kubectl create secret generic telemetry-jwt-secret \
#   --from-literal=JWT_SECRET="your-long-random-secret" \
#   -n telemetry-search
apiVersion: v1
kind: Secret
metadata:
  name: telemetry-jwt-secret
  namespace: telemetry-search
type: Opaque
data:
  # base64("telemetry-search-dev-secret-change-in-production")
  JWT_SECRET: dGVsZW1ldHJ5LXNlYXJjaC1kZXYtc2VjcmV0LWNoYW5nZS1pbi1wcm9kdWN0aW9u
---
# Default user passwords — change before deploying to production
apiVersion: v1
kind: Secret
metadata:
  name: telemetry-user-secrets
  namespace: telemetry-search
type: Opaque
data:
  # base64("admin123") — CHANGE IN PRODUCTION
  ADMIN_PASSWORD: YWRtaW4xMjM=
  # base64("writer123")
  WRITER_PASSWORD: d3JpdGVyMTIz
  # base64("reader123")
  READER_PASSWORD: cmVhZGVyMTIz
