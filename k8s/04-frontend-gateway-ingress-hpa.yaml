---
# ── Frontend ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: telemetry-search
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/telemetry-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: telemetry-search
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
# ── API Gateway (Nginx) ───────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-config
  namespace: telemetry-search
data:
  nginx.conf: |
    events { worker_connections 1024; }
    http {
      limit_req_zone $binary_remote_addr zone=search_zone:10m rate=60r/m;
      limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=10r/m;
      limit_req_zone $binary_remote_addr zone=auth_zone:10m   rate=20r/m;

      upstream auth_svc    { server auth-service:8081; }
      upstream search_svc  { server search-service:8082; }
      upstream ingest_svc  { server ingest-service:8083; }
      upstream frontend_svc { server frontend:80; }

      server {
        listen 80;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        location /api/v1/auth/  { limit_req zone=auth_zone burst=10 nodelay; proxy_pass http://auth_svc; proxy_set_header Host $host; }
        location /api/v1/admin/ { limit_req zone=auth_zone burst=5 nodelay;  proxy_pass http://auth_svc; proxy_set_header Host $host; }
        location /api/v1/search { limit_req zone=search_zone burst=30 nodelay; proxy_pass http://search_svc; proxy_set_header Host $host; }
        location /api/v1/stats  { limit_req zone=search_zone burst=20 nodelay; proxy_pass http://search_svc; proxy_set_header Host $host; }
        location /api/v1/reindex { limit_req zone=upload_zone burst=3 nodelay; proxy_pass http://search_svc; proxy_set_header Host $host; }
        location /api/v1/upload { limit_req zone=upload_zone burst=5 nodelay; client_max_body_size 512m; proxy_pass http://ingest_svc; proxy_read_timeout 300s; proxy_set_header Host $host; }
        location /api/v1/files  { limit_req zone=search_zone burst=20 nodelay; proxy_pass http://ingest_svc; proxy_set_header Host $host; }
        location /api/v1/jobs   { limit_req zone=search_zone burst=20 nodelay; proxy_pass http://ingest_svc; proxy_set_header Host $host; }
        location /health        { proxy_pass http://search_svc/health; access_log off; }
        location /              { proxy_pass http://frontend_svc; proxy_set_header Host $host; }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: telemetry-search
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: gateway-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: telemetry-search
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer

---
# ── Ingress ───────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: telemetry-search-ingress
  namespace: telemetry-search
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "512m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - telemetry-search.example.com
      secretName: telemetry-search-tls
  rules:
    - host: telemetry-search.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80

---
# ── HPA ───────────────────────────────────────────────────────────────────────
# Auth service: stateless, scales on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: telemetry-search
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
# Ingest service: scales on CPU (worker-bound)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingest-service-hpa
  namespace: telemetry-search
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingest-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Search service: DO NOT auto-scale beyond 1 until WAL replication is in place.
# See architecture notes: each pod builds its own in-memory index.
# Phase 2b: replace with read-replica pattern + WAL broadcast.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: search-service-hpa
  namespace: telemetry-search
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: search-service
  minReplicas: 1
  maxReplicas: 1   # Phase 2b: increase to 5 when WAL replication is implemented
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
