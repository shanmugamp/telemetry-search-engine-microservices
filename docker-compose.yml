x-common-env: &common-env
  GIN_MODE: release
  JWT_SECRET: ${JWT_SECRET:-telemetry-search-dev-secret-change-in-production}
  ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}

# ── Shared search-shard template ──────────────────────────────────────────────
x-shard: &shard-base
  build:
    context: ./search-service
  environment:
    <<: *common-env
    PORT: "8082"
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 30s
  networks:
    - telemetry-net

services:

  # ── API Gateway ──────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
    container_name: ts-gateway
    ports:
      - "3000:80"
    depends_on:
      auth-service:
        condition: service_healthy
      coordinator:
        condition: service_healthy
      ingest-service:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - telemetry-net

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
    container_name: ts-auth
    environment:
      <<: *common-env
      PORT: "8081"
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD:-admin123}
      WRITER_PASSWORD: ${WRITER_PASSWORD:-writer123}
      READER_PASSWORD: ${READER_PASSWORD:-reader123}
    ports:
      - "8081:8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - telemetry-net

  # ── Search Shard 0 — parquet files 0,3,6,9,… ─────────────────────────────────
  shard-0:
    <<: *shard-base
    container_name: ts-shard-0
    environment:
      <<: *common-env
      PORT: "8082"
      DATA_DIR: /app/parquet
      SHARD_ID: "0"
    volumes:
      - shard-0-data:/app/parquet
    ports:
      - "8082:8082"

  # ── Search Shard 1 — parquet files 1,4,7,10,… ────────────────────────────────
  shard-1:
    <<: *shard-base
    container_name: ts-shard-1
    environment:
      <<: *common-env
      PORT: "8082"
      DATA_DIR: /app/parquet
      SHARD_ID: "1"
    volumes:
      - shard-1-data:/app/parquet
    ports:
      - "8083:8082"

  # ── Search Shard 2 — parquet files 2,5,8,11,… ────────────────────────────────
  shard-2:
    <<: *shard-base
    container_name: ts-shard-2
    environment:
      <<: *common-env
      PORT: "8082"
      DATA_DIR: /app/parquet
      SHARD_ID: "2"
    volumes:
      - shard-2-data:/app/parquet
    ports:
      - "8084:8082"

  # ── Query Coordinator ────────────────────────────────────────────────────────
  # Fans queries to all 3 shards in parallel, merges and ranks globally.
  coordinator:
    build:
      context: ./coordinator
    container_name: ts-coordinator
    environment:
      <<: *common-env
      PORT: "8090"
      SHARD_URLS: "http://shard-0:8082,http://shard-1:8082,http://shard-2:8082"
    ports:
      - "8090:8090"
    depends_on:
      shard-0:
        condition: service_healthy
      shard-1:
        condition: service_healthy
      shard-2:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - telemetry-net

  # ── Ingest Service ───────────────────────────────────────────────────────────
  # Routes uploads to the correct shard via coordinator.
  ingest-service:
    build:
      context: ./ingest-service
    container_name: ts-ingest
    environment:
      <<: *common-env
      PORT: "8085"
      UPLOAD_DIR: /app/uploads
      SEARCH_SERVICE_URL: http://coordinator:8090
    volumes:
      # Ingest writes to a staging volume; coordinator routes to correct shard.
      - ingest-staging:/app/uploads
    ports:
      - "8086:8085"
    depends_on:
      coordinator:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - telemetry-net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: ts-frontend
    restart: unless-stopped
    networks:
      - telemetry-net

volumes:
  shard-0-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${SHARD_0_DATA:-./parquet-data/shard-0}
  shard-1-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${SHARD_1_DATA:-./parquet-data/shard-1}
  shard-2-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${SHARD_2_DATA:-./parquet-data/shard-2}
  ingest-staging:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${INGEST_STAGING:-./parquet-data/staging}

networks:
  telemetry-net:
    driver: bridge
